version: "3.9"

# ================================================================
# Local dev stack: MSSQL + the app in dev mode
# Usage:
#   docker-compose up -d mssql          # start only the DB
#   ./mvnw quarkus:dev                  # run app in Quarkus dev mode
# ================================================================

services:

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mission-control-mssql
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "DevP@ssw0rd!"
      MSSQL_DB: "MissionControl"
    volumes:
      - mssql-data:/var/opt/mssql
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD", "/opt/mssql-tools/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "DevP@ssw0rd!", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: space-mission-control
    ports:
      - "8080:8080"
    environment:
      QUARKUS_PROFILE: dev
      DB_HOST: mssql
      DB_PORT: "1433"
      DB_NAME: MissionControl
      DB_USERNAME: sa
      DB_PASSWORD: "DevP@ssw0rd!"
    depends_on:
      mssql:
        condition: service_healthy
    profiles:
      - full  # only start with: docker-compose --profile full up

volumes:
  mssql-data:
