# ===========================================================
# Space Mission Control - Quarkus Application Configuration
#
# Auth pattern: Secretless Broker (sidecar)
# In production the app connects to localhost:1433 with no
# credentials. The Secretless Broker sidecar intercepts the
# connection, authenticates to Conjur via authn-k8s, and
# injects DB credentials at the TDS protocol level.
# ===========================================================

"%dev":
  quarkus:
    datasource:
      db-kind: mssql
      username: sa
      password: "DevP@ssw0rd!"
      jdbc:
        url: jdbc:sqlserver://localhost:1433;databaseName=MissionControl;encrypt=false;trustServerCertificate=true
    hibernate-orm:
      database:
        generation: none
      log:
        sql: true
    flyway:
      migrate-at-start: true
    swagger-ui:
      always-include: true

"%test":
  quarkus:
    datasource:
      db-kind: h2
      jdbc:
        url: jdbc:h2:mem:testdb;MODE=MSSQLServer
    hibernate-orm:
      database:
        generation: drop-and-create
    flyway:
      migrate-at-start: false

# Production config — Secretless Broker sidecar handles auth transparently.
# The broker listens on localhost:1433 and proxies to the real mssql Service.
# DB_NAME is the only env var needed; credentials are never present in the pod.
quarkus:
  application:
    name: space-mission-control
    version: 1.0.0

  datasource:
    db-kind: mssql
    # No username / password — Secretless injects them at the protocol layer
    jdbc:
      url: jdbc:sqlserver://localhost:1433;databaseName=${DB_NAME};encrypt=false;trustServerCertificate=true

  hibernate-orm:
    database:
      generation: none
    log:
      sql: false

  flyway:
    migrate-at-start: true
    locations: db/migration

  rest:
    path: /api

  smallrye-openapi:
    info-title: "🚀 Space Mission Control API"
    info-version: "1.0.0"
    info-description: "Manage astronaut missions, crew assignments, and launch sequences"

  swagger-ui:
    always-include: false
    path: /swagger-ui

  health:
    extensions:
      enabled: true

  log:
    console:
      format: "%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n"
      json: false
    level: INFO
    category:
      "com.demo":
        level: DEBUG

  # OpenShift / Kubernetes configuration
  kubernetes:
    deployment-target: openshift
    labels:
      app: space-mission-control
      version: 1.0.0
      app.kubernetes.io/part-of: space-mission-control
    env:
      vars:
        CONJUR_APPLIANCE_URL: ""
        CONJUR_ACCOUNT: ""
        CONJUR_AUTHN_LOGIN: ""

# Conjur connection metadata — used by the Secretless Broker sidecar.
# All values must be supplied via environment variables at deploy time.
# No namespace-specific defaults live here — the app is deployment-agnostic.
conjur:
  account: ${CONJUR_ACCOUNT}
  appliance-url: ${CONJUR_APPLIANCE_URL}
  authn-login: ${CONJUR_AUTHN_LOGIN}
  ssl-certificate: ${CONJUR_SSL_CERTIFICATE:}

mission:
  max-crew-size: 7
  launch-countdown-seconds: 10
