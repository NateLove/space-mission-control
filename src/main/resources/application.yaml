# ===========================================================
# Space Mission Control - Quarkus Application Configuration
#
# Production auth pattern:
#   Quarkus -> Secretless sidecar -> Conjur -> MSSQL
#
# Quarkus connects only to 127.0.0.1:1433.
# Secretless handles real DB credentials via Conjur.
# ===========================================================

"%dev":
  quarkus:
    datasource:
      db-kind: mssql
      username: sa
      password: "DevP@ssw0rd!"
      jdbc:
        url: jdbc:sqlserver://127.0.0.1:1433;databaseName=MissionControl;encrypt=false;trustServerCertificate=true
    hibernate-orm:
      database:
        generation: none
      log:
        sql: true
    flyway:
      migrate-at-start: true
    swagger-ui:
      always-include: true

"%test":
  quarkus:
    datasource:
      db-kind: h2
      jdbc:
        url: jdbc:h2:mem:testdb;MODE=MSSQLServer
    hibernate-orm:
      database:
        generation: drop-and-create
    flyway:
      migrate-at-start: false

quarkus:
  application:
    name: space-mission-control
    version: 1.0.0

  datasource:
    db-kind: mssql

    # Required so the SQL Server driver sends a normal login handshake.
    # Secretless replaces these with the real credentials from Conjur.
    username: placeholder
    password: placeholder

    jdbc:
      url: jdbc:sqlserver://127.0.0.1:1433;databaseName=${DB_NAME};encrypt=false;trustServerCertificate=true;loginTimeout=5

  hibernate-orm:
    database:
      generation: none
    log:
      sql: false

  flyway:
    migrate-at-start: true
    locations: db/migration

  rest:
    path: /api

  smallrye-openapi:
    info-title: "🚀 Space Mission Control API"
    info-version: "1.0.0"
    info-description: "Manage astronaut missions, crew assignments, and launch sequences"

  swagger-ui:
    always-include: true
    path: /swagger-ui

  health:
    extensions:
      enabled: true

  log:
    console:
      format: "%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n"
    level: INFO
    category:
      "com.demo":
        level: DEBUG

mission:
  max-crew-size: 7
  launch-countdown-seconds: 10